<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HospitalityOS</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
<div class="logo">
  <svg width="80" height="32" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    
    <!-- testo -->
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="white">
      mia
    </text>

    <!-- pallina -->
    <circle cx="78" cy="8" r="4" fill="#3b82f6">
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- glow -->
    <circle cx="78" cy="8" r="6" fill="#3b82f6" opacity="0.2">
      <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
    </circle>

  </svg>
</div>
<div class="workspace">Bungalow</div>
    <nav>
      <a class="active">Dashboard</a>
      <a>Inbox</a>
      <a>Upcoming</a>
      <a>Functions</a>
      <a>Feedback</a>
    </nav>

    <div class="sidebar-footer">
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
  </aside>

<main class="main">

  <div class="page-header">
  <div>
    <h1>Dashboard</h1>
    <p class="subtitle">AI handling your bookings & functions</p>
  </div>
</div>

  <section class="panel">
    <h2>New Requests</h2>
    <div id="requests"></div>
  </section>

  <section class="grid-2">
    <section class="panel">
      <h2>Upcoming This Week</h2>
      <div id="upcoming"></div>
    </section>

    <section class="panel">
      <h2>Pending Actions</h2>
      <div id="actions"></div>
    </section>
  </section>

</main>

</div>

<script src="/app.js"></script>
</body>
</html>
