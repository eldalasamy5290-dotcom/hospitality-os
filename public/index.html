<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HospitalityOS</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="logo">
  <img src="/logo.PNG" alt="HospitalityOS" class="logo-img" />
</div>
<div class="workspace">Bungalow</div>
    <nav>
      <a class="active">Dashboard</a>
      <a>Inbox</a>
      <a>Upcoming</a>
      <a>Functions</a>
      <a>Feedback</a>
    </nav>

    <div class="sidebar-footer">
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
  </aside>

<main class="main">

  <div class="page-header">
  <div>
    <h1>Dashboard</h1>
    <p class="subtitle">AI handling your bookings & functions</p>
  </div>
</div>

  <section class="panel">
    <h2>New Requests</h2>
    <div id="requests"></div>
  </section>

  <section class="grid-2">
    <section class="panel">
      <h2>Upcoming This Week</h2>
      <div id="upcoming"></div>
    </section>

    <section class="panel">
      <h2>Pending Actions</h2>
      <div id="actions"></div>
    </section>
  </section>

</main>

</div>

<script src="/app.js"></script>
</body>
</html>
