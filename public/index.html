<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HospitalityOS</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
<div class="logo">
  <img src="/mia-logo.png" alt="Mia" class="logo-img">
</div>
<div class="workspace">Demo Venue</div>
    <nav>
  <a href="#" class="active" onclick="setPage('dashboard', this); return false;">Dashboard</a>
  <a href="#" onclick="setPage('inbox', this); return false;">Inbox</a>
  <a href="#" onclick="setPage('upcoming', this); return false;">Upcoming</a>
  <a href="#" onclick="setPage('functions', this); return false;">Functions</a>
  <a href="#" onclick="setPage('feedback', this); return false;">Feedback</a>
</nav>

    <div class="sidebar-footer">
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
  </aside>

<main class="main" id="main-content">
<div id="dashboard-page">

  <div class="page-header">
  <div>
    <div class="mia-status">
  <div class="mia-dot"></div>
  <span id="mia-text">Mia is online</span>
</div>
    <h1 id="page-title">Dashboard</h1>
    <p class="subtitle">AI handling your bookings & functions</p>
  </div>
</div>

  <section class="panel">
    <h2>New Requests</h2>
    <div id="requests"></div>
  </section>

  <section class="grid-2">
    <section class="panel">
      <h2>Upcoming This Week</h2>
      <div id="upcoming"></div>
    </section>

    <section class="panel">
      <h2>Pending Actions</h2>
      <div id="actions"></div>
    </section>
  </section>
<div id="functions-page" style="display: none;"></div>

</main>

</div>

<script src="/app.js"></script>
</body>
</html>
